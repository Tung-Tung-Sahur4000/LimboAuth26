name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag to create and publish (e.g. v1.1.14)"
        required: true
        default: v1.1.14

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build LimboAuth
        run: ./gradlew build

      - name: Locate plugin JAR
        id: jar
        run: |
          jar="$(find build/libs -maxdepth 1 -name 'limboauth-*.jar' ! -name '*-sources.jar' ! -name '*-javadoc.jar' -print -quit)"
          if [ -z "$jar" ]; then
            echo "No plugin JAR found in build/libs" >&2
            exit 1
          fi
          echo "Found plugin JAR: $jar"
          echo "path=$jar" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: LimboAuth ${{ github.event.inputs.version || github.ref_name }}
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          generate_release_notes: true
          files: ${{ steps.jar.outputs.path }}
